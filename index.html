<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syncware - Private Chat 💕</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen">
        <div class="login-card">
            <div class="heart-icon">💕</div>
            <h1>Syncware</h1>
            <p>Private chat. No history. Just us.</p>
            <input type="text" id="nameInput" placeholder="Your name..." maxlength="20">
            <button id="startBtn" onclick="startChat()">Start Chatting 💬</button>
            <p class="hint">🔒 Messages disappear when you close this tab</p>
        </div>
    </div>

    <!-- Chat Screen -->
    <div id="chatScreen" style="display: none;">
        <div class="chat-header">
            <div class="header-left">
                <span class="avatar">💑</span>
                <div>
                    <h2>Syncware Chat</h2>
                    <p class="status">🟢 Connected</p>
                </div>
            </div>
            <span class="badge">🔒 No storage</span>
        </div>

        <div id="messagesContainer" class="messages-container"></div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()" class="send-btn">➤</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
