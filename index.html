<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HeartSync - Chat, Share 💕</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen">
        <div class="login-card">
            <div class="icon">💕</div>
            <h1>HeartSync</h1>
            <p>Chat • Call • Share images</p>
            <input type="text" id="nameInput" placeholder="Your name..." maxlength="20" autocomplete="off">
            <button id="startBtn" onclick="startChat()">Start Chatting 💬</button>
            <p class="hint">🔒 All messages & images auto-delete</p>
            <div class="features">
                <span>💬 Chat</span>
                
                <span>📸 Images</span>
                <span>⏰ 10min</span>
            </div>
        </div>
    </div>

    <!-- Chat Screen -->
    <div id="chatScreen">
        <div class="chat-header">
            <div class="header-left">
                <div class="avatar">💑</div>
                <div>
                    <p class="status">🟢 Connected</p>
                </div>
            </div>
            <div class="header-actions">
                <button class="call-btn" onclick="startCall('video')" title="Video Call">📹</button>
            </div>
        </div>

        <div id="messagesContainer" class="messages-container">
            <div class="welcome-message">
                <span>💕</span>
                <p>Welcome to HeartSync!</p>
                <p class="sub-text">Your private chat. No history stored.</p>
            </div>
        </div>

        <div class="input-area">
            <button class="image-upload-btn" onclick="sendImage()" title="Send Image">🖼️</button>
            <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)" autocomplete="off">
            <button class="send-btn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Call Screen -->
    <div id="callScreen">
        <div class="call-header">
            <span id="callStatus">Calling...</span>
        </div>
        <div class="video-container">
            <div class="video-box">
                <video id="localVideo" autoplay muted playsinline></video>
                <div class="video-label">You</div>
            </div>
            <div class="video-box">
                <video id="remoteVideo" autoplay playsinline></video>
                <div class="video-label">Partner</div>
            </div>
        </div>
        <div class="call-controls">
            <button class="call-control-btn mute-btn" onclick="toggleMute()">🎤</button>
       
        </div>
    </div>

    <!-- Incoming Call Notification -->
    <div id="incomingCall">
        
        <h3><span id="callerName"></span> is calling...</h3>
        <p id="callType" style="color: #666;"></p>
        <div class="incoming-actions">
            <button class="accept-btn" onclick="acceptCall()">✅</button>
            <button class="reject-btn" onclick="rejectCall()">❌</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
